<!DOCTYPE html>
<html>
<body>
    <h3>Upload a CSV file</h3>
    <input type="file" id="csvFile" accept=".csv" />
    <pre id="output"></pre>

    <script>
        //text = "'P1',1,2,3\n'P2',2,2,2\n'P3',3,2,1\n"
        //rows = parseCSV(text)

        var xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function () {
            if (this.readyState == 4 && this.status == 200) {
                // Action to be performed when the document is read;
                csv = xhttp.responseText;
                rows = parseCSV(xhttp.responseText);
            }
        };
        xhttp.open("GET", "./Vipr_Player_Progressions_Wide.csv", true);
        xhttp.send();

        // Simple CSV parser (supports quoted fields)
        function parseCSV(text) {
            const rows = [];
            let current = '';
            let row = [];
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"' && inQuotes && nextChar === '"') {
                    // Escaped quote
                    current += '"';
                    i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    row.push(current);
                    current = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (current || row.length > 0) {
                        row.push(current);
                        rows.push(row);
                        row = [];
                        current = '';
                    }
                } else {
                    current += char;
                }
            }

            // Add last value if exists
            if (current || row.length > 0) {
                row.push(current);
                rows.push(row);
            }

            return rows;
        }
    </script>
</body>
</html>
